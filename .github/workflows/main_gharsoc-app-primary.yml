name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: gharsoc-app-primary-v2
  NODE_VERSION: '20.x'
  PROJECT_PATH: 'gharsoch-web'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.PROJECT_PATH }}/package-lock.json

      - name: npm install, build, and test
        run: |
          cd ${{ env.PROJECT_PATH }}
          npm install --legacy-peer-deps
          npm run build --if-present
        env:
          DATABASE_URL: mongodb://localhost:27017/unused-during-build
          AUTH_TRUST_HOST: 'true'
          NEXTAUTH_URL: https://gharsoch.tech
          AUTH_URL: https://gharsoch.tech

      - name: Prepare standalone deployment artifact
        run: |
          cd ${{ env.PROJECT_PATH }}
          # Next.js standalone build outputs a self-contained server in .next/standalone/
          # We need: standalone/* + .next/static/ (assets) + public/ (static files)
          mkdir -p deploy/.next
          cp -r .next/standalone/. deploy/
          cp -r .next/static deploy/.next/static
          cp -r public deploy/public 2>/dev/null || true
          # Copy package.json so npm start runs node server.js if Azure chooses npm start.
          cp package.json deploy/package.json

      - name: Zip deployment artifact
        run: |
          cd ${{ env.PROJECT_PATH }}/deploy
          zip -r ../../deploy.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Development'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Clean wwwroot before deploy
        run: |
          # Wipe stale files from previous deploys (for example old app/ and data/ folders).
          # This workflow uses a publish profile, so clean through Kudu instead of Azure CLI login.
          python3 - <<'PY' > kudu.env
          import base64
          import os
          import xml.etree.ElementTree as ET

          root = ET.fromstring(os.environ["PUBLISH_PROFILE"])
          profile = next(
              p for p in root.findall("publishProfile")
              if p.attrib.get("publishMethod") == "MSDeploy"
          )
          token = f"{profile.attrib['userName']}:{profile.attrib['userPWD']}"
          print("KUDU_AUTH=" + base64.b64encode(token.encode()).decode())
          PY
          set -a
          . ./kudu.env
          set +a
          curl -fsS -X DELETE -H "Authorization: Basic $KUDU_AUTH" "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/vfs/site/wwwroot/?recursive=true" || true
          echo "wwwroot cleaned"
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_V2 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_V2 }}
          package: deploy.zip
