name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: gharsoc-app-primary
  NODE_VERSION: '20.x'
  PROJECT_PATH: 'gharsoch-web'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.PROJECT_PATH }}/package-lock.json

      - name: npm install, build, and test
        run: |
          cd ${{ env.PROJECT_PATH }}
          npm install
          npm run build --if-present
        env:
          DATABASE_URL: mongodb://localhost:27017/unused-during-build

      - name: Zip artifact for deployment
        run: |
          cd ${{ env.PROJECT_PATH }}
          # Copy static and public files into the standalone folder
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cd .next/standalone
          zip -r ../../release.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ${{ env.PROJECT_PATH }}/release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Development'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_7B6B0D5B6B4B4B4B }}
          package: .
